# Apache 虚拟主机配置 - 漏洞靶机
# 监听 8080 端口，部署在 /var/www/vulnerable

Listen 8080

<VirtualHost *:8080>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/vulnerable

    <Directory /var/www/vulnerable>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # 上传目录 - 允许执行 PHP（漏洞配置）
    <Directory /var/www/vulnerable/uploads>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog /var/log/httpd/vulnerable_error.log
    CustomLog /var/log/httpd/vulnerable_access.log combined
</VirtualHost>
